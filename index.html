<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The odin sign-up form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="imgpart">
            <img class="mainimg" src="https://i.pinimg.com/1200x/3e/81/a8/3e81a8bfd4969b227cb58bc0627cf2c0.jpg"
                alt="login photo">
            <div class="logo">
                <img src="https://raw.githubusercontent.com/TheOdinProject/curriculum/5f37d43908ef92499e95a9b90fc3cc291a95014c/html_css/project-sign-up-form/odin-lined.png"
                    alt="logo">
                <p class="fontlogo">ODIN</p>
            </div>
            <p class="credit">Photo by Huclan Reis</p>
        </div>
        <div class="content">
            <div class="div1">
                <p class="rightcontent">This is not a real online service! You know you need something like this in your life to help you
                    realize your deepest dreams. <br>
                    Sign up <em>now</em> to get started</p>
                <p class="sp">You <em>know</em> you want to.</p>
            </div>
            <div class="formto">
                <p class="parabold">Let's do this!</p>
                <form action="#" id="signupform">
                <div class="formto1">
                    
                        <div class="fill">
                            <label for="firstname">FIRST NAME</label>
                            <input type="text" name="fname" id="firstname" maxlength="16" minlength="2" required>
                        </div>
                        <div class="fill">
                            <label for="lastname">LAST NAME</label>
                            <input type="text" name="lname" id="lastname" maxlength="16" minlength="2" required>
                        </div>
                        <div class="fill">
                            <label for="mail">EMAIL</label>
                            <input type="email" name="umail" id="mail" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                                required placeholder="example@gmail.com">
                        </div>
                        <div class="fill">
                            <label for="phno">PHONE NUMBER</label>
                            <input type="tel" name="phoneno" id="phno" required minlength="11">
                        </div>
                        <div class="fill" id="pass1">
                            <label for="pass">PASSWORD</label>
                            <input type="password" name="passw" id="pass" required minlength="7">
                        </div>
                        <div class="fill" id="pass2">
                            <label for="cpass">CONFIRM PASSWORD</label>
                            <input type="password" name="passw" id="cpass" required minlength="7">
                        </div>
                    
                </div>
                </form>
            </div>

            <div class="div3">
                <button type="submit" form="signupform">Create Account</button>
                <div class="login">
                    <p>Already have an account?</p>
                    <a href="#">Log in</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
